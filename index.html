<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Aviary Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c0a;--surface:#0f1410;--surface2:#161d17;--border:#1e271f;--text:#d4e8d6;--muted:#4a5e4c;--p1:#5fbf8a;--p2:#e8a84a;--p3:#b07de8;--p4:#5aabdf;--danger:#e85a5a;--success:#4caf76;--warn:#f0c040;--cur:#5fbf8a}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;max-width:500px;margin:0 auto;padding-bottom:120px}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:0.35}
.hdr{position:sticky;top:0;background:var(--bg);border-bottom:1px solid var(--border);padding:18px 18px 12px;z-index:100}
.hdr-eye{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:3px}
.hdr-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;letter-spacing:-0.5px;margin-bottom:10px}
.hdr-title span{color:var(--cur)}
.date-disp{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:10px}
.date-disp strong{color:var(--cur)}
.cage-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.cage-row::-webkit-scrollbar{display:none}
.cpill{padding:5px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.cpill.active{border-color:var(--cur);background:color-mix(in srgb,var(--cur) 15%,transparent);color:var(--cur)}
.alert-bar{padding:0 18px}
.alert{border-radius:10px;padding:9px 13px;margin-bottom:6px;font-size:11px;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:8px}
.alert.warn{background:color-mix(in srgb,var(--warn) 12%,transparent);border:1px solid color-mix(in srgb,var(--warn) 30%,transparent);color:var(--warn)}
.alert.danger{background:color-mix(in srgb,var(--danger) 12%,transparent);border:1px solid color-mix(in srgb,var(--danger) 30%,transparent);color:var(--danger)}
.alert.info{background:color-mix(in srgb,var(--cur) 10%,transparent);border:1px solid color-mix(in srgb,var(--cur) 25%,transparent);color:var(--cur)}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 18px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tbtn{padding:10px 0;margin-right:16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tbtn.active{border-bottom-color:var(--cur);color:var(--cur)}
.content{padding:14px 18px}
.phase-row{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
.phase-row::-webkit-scrollbar{display:none}
.pbtn{padding:7px 13px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.pbtn.active{border-color:var(--cur);background:color-mix(in srgb,var(--cur) 12%,var(--surface));color:var(--cur)}
.phase-card{border-radius:14px;border:1px solid color-mix(in srgb,var(--cur) 25%,transparent);background:var(--surface2);padding:14px 16px;margin-bottom:12px}
.pc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pc-icon{font-size:22px}
.pc-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--cur);margin-bottom:2px}
.pc-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff}
.pc-meta{display:flex;gap:14px}
.pc-meta span{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.phase-timer{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 13px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.pt-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:3px}
.pt-weeks{font-family:'DM Mono',monospace;font-size:15px;color:var(--cur);font-weight:600}
.pt-sub{font-size:11px;color:var(--muted);margin-top:2px}
.pt-warn{color:var(--warn)!important}
.pt-danger{color:var(--danger)!important}
.pt-btns{display:flex;gap:6px}
.pt-btn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;padding:5px 10px;cursor:pointer;font-family:'DM Mono',monospace}

/* ── Bottom navigation bar for flock-wide views ── */
/* Push content above bottom nav */

.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 12px}
.week-nav button{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 8px;transition:color .15s}
.week-nav button:hover{color:var(--text)}
.wk-lbl{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);text-align:center}
.wk-lbl small{display:block;color:var(--muted);font-size:9px;margin-top:2px}
.day-row{border-radius:12px;border:1px solid var(--border);background:var(--surface);margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.day-row.today{border-color:var(--cur);background:color-mix(in srgb,var(--cur) 6%,var(--surface))}
.day-hdr{display:flex;align-items:center;gap:8px;padding:9px 13px;border-bottom:1px solid var(--border)}
.day-name{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;color:var(--muted);width:32px}
.day-row.today .day-name{color:var(--cur)}
.today-badge{font-size:9px;background:var(--cur);color:#000;border-radius:4px;padding:2px 6px;font-family:'DM Mono',monospace;font-weight:700;letter-spacing:1px}
.done-badge{margin-left:auto;font-size:10px;color:var(--success);font-family:'DM Mono',monospace}
.date-badge{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-left:auto}
.day-body{padding:10px 13px}
.task-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:9px}
.task-row:last-child{margin-bottom:0}
.chk{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;margin-top:1px}
.chk.on{border-color:var(--cur);background:var(--cur)}
.chk svg{display:none}
.chk.on svg{display:block}
.tsk-lbl{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:2px;letter-spacing:1px}
.tsk-txt{font-size:12.5px;color:var(--text);line-height:1.5;transition:all .15s}
.tsk-txt.done{color:var(--muted);text-decoration:line-through}
.notes-row{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.notes-lbl{font-size:9px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:4px;letter-spacing:1px}
.notes-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;padding:7px 10px;resize:none;outline:none;transition:border-color .15s}
.notes-inp:focus{border-color:var(--cur)}
.sec-title{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.hist-week{margin-bottom:20px}
.hist-wk-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.hist-row{display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--surface);border-radius:8px;margin-bottom:4px}
.hist-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:86px;flex-shrink:0}
.hist-dots{display:flex;gap:5px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border)}
.dot.on{background:var(--success)}
.hist-note{font-size:11px;color:var(--muted);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-left:4px}
.hist-ptag{font-size:9px;font-family:'DM Mono',monospace;color:var(--muted);background:var(--surface2);padding:2px 6px;border-radius:4px;flex-shrink:0}
.temp-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.temp-today{display:flex;gap:10px;margin-bottom:12px}
.temp-inp-wrap{flex:1}
.temp-inp-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
.temp-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;font-family:'DM Mono',monospace;padding:8px 10px;outline:none;transition:border-color .15s;-moz-appearance:textfield}
.temp-inp::-webkit-inner-spin-button,.temp-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.temp-inp:focus{border-color:var(--cur)}
.temp-save-btn{align-self:flex-end;background:var(--cur);border:none;border-radius:8px;color:#000;font-size:12px;font-family:'DM Mono',monospace;font-weight:600;padding:9px 14px;cursor:pointer}
.temp-hist-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.temp-hist-row:last-child{border-bottom:none}
.temp-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.temp-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:600}
.t-hot{color:var(--danger)}.t-warn{color:var(--warn)}.t-ok{color:var(--success)}
.clutch-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.clutch-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.clutch-title{font-family:'DM Mono',monospace;font-size:11px;color:var(--cur);font-weight:600}
.clutch-body{padding:12px 14px}
.egg-grid-hdr{display:grid;grid-template-columns:24px 1fr 92px 52px 34px;gap:6px;margin-bottom:6px}
.egg-grid-hdr span{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px}
.egg-row{display:grid;grid-template-columns:24px 1fr 92px 52px 34px;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.egg-row:last-child{border-bottom:none}
.egg-num{font-family:'DM Mono',monospace;color:var(--muted);font-size:11px}
.egg-inp{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;font-family:'DM Mono',monospace;padding:4px 6px;width:100%;outline:none}
.egg-inp:focus{border-color:var(--cur)}
.egg-sel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;font-family:'DM Mono',monospace;padding:4px 6px;width:100%;outline:none}
.egg-sel option{background:#111}
.egg-hatch{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.egg-hatch.fertile{color:var(--success)}.egg-hatch.hatched{color:var(--p3)}.egg-hatch.clear{color:var(--danger)}
.add-egg-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;border:1px dashed var(--border);border-radius:8px;background:transparent;color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;cursor:pointer;margin-top:8px;transition:all .15s}
.add-egg-btn:hover{border-color:var(--cur);color:var(--cur)}
.weight-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.weight-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:10px}
.w-inp-wrap{flex:1}
.w-inp-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
.w-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:'DM Mono',monospace;padding:7px 10px;outline:none;-moz-appearance:textfield}
.w-inp::-webkit-inner-spin-button,.w-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.w-inp:focus{border-color:var(--cur)}
.w-btn{background:var(--cur);border:none;border-radius:8px;color:#000;font-size:11px;font-family:'DM Mono',monospace;font-weight:600;padding:8px 12px;cursor:pointer}
.wlog-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.wlog-row:last-child{border-bottom:none}
.wl-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.wl-val{font-family:'DM Mono',monospace;font-weight:600}
.wl-up{color:var(--success)}.wl-dn{color:var(--danger)}
.stock-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px}
.stock-hdr{padding:10px 14px;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px}
.stock-row{display:grid;grid-template-columns:1fr 80px 44px;gap:8px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border)}
.stock-row:last-child{border-bottom:none}
.stock-name{font-size:13px;color:var(--text)}
.s-inp{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;padding:5px 8px;width:100%;outline:none;-moz-appearance:textfield;text-align:right}
.s-inp::-webkit-inner-spin-button,.s-inp::-webkit-outer-spin-button{-webkit-appearance:none}
.s-inp:focus{border-color:var(--cur)}
.s-inp.low{color:var(--danger)!important;border-color:color-mix(in srgb,var(--danger) 40%,transparent)!important}
.s-unit{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.qc-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px}
.qc-icon{font-size:20px;flex-shrink:0}
.qc-title{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:#e8c97a;margin-bottom:4px}
.qc-desc{font-size:12.5px;color:#999;line-height:1.6}
.prep-table{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:18px}
.prep-hdr{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;padding:12px 14px 8px;border-bottom:1px solid var(--border)}
.prep-row{display:grid;grid-template-columns:1fr 40px 80px;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border)}
.prep-row:last-child{border-bottom:none}
.prep-row.total{background:var(--surface2)}
.pi{font-size:13px;color:var(--text)}.pr{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}.pq{font-size:12px;color:var(--p2);font-family:'DM Mono',monospace}
.export-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:12px;border:1px solid var(--cur);background:color-mix(in srgb,var(--cur) 10%,transparent);color:var(--cur);font-size:13px;font-family:'DM Mono',monospace;cursor:pointer;margin-top:16px;transition:all .15s}
.export-btn:hover{background:color-mix(in srgb,var(--cur) 20%,transparent)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px}
.empty .ei{font-size:32px;margin-bottom:12px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.content>*{animation:fadeUp .2s ease forwards}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeUp .15s ease}
/* NEW TAB STYLES */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.card-title{font-family:'DM Mono',monospace;font-size:10px;color:var(--cur);letter-spacing:2px;margin-bottom:10px}
.form-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:10px}
.form-field{flex:1}
.form-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:4px}
.finp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;padding:8px 10px;outline:none;transition:border-color .15s}
.finp:focus{border-color:var(--cur)}
select.finp{cursor:pointer}
select.finp option{background:#111}
.btn2{padding:9px 14px;border-radius:9px;border:none;font-size:12px;font-family:'DM Mono',monospace;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn2.pri{background:var(--cur);color:#000}
.btn2.ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn2.dng{background:var(--danger);color:#fff}
.btn2.full{width:100%;justify-content:center}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.stat-val{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:var(--cur);margin-bottom:2px}
.stat-lbl{font-size:11px;color:var(--muted)}
.rbar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rbar-label{font-size:12px;color:var(--text);width:90px;flex-shrink:0}
.rbar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.rbar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.rbar-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:34px;text-align:right}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;padding:7px 9px;border-bottom:1px solid var(--border);text-align:left}
.tbl td{padding:8px 9px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.hlog-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.hlog-row:last-child{border-bottom:none}
.hlog-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:56px;flex-shrink:0;margin-top:2px}
.hbadge{font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:4px;flex-shrink:0}
.hb-ok{background:color-mix(in srgb,var(--success) 20%,transparent);color:var(--success)}
.hb-med{background:color-mix(in srgb,var(--p3) 20%,transparent);color:var(--p3)}
.hb-warn{background:color-mix(in srgb,var(--warn) 20%,transparent);color:var(--warn)}
.mstone-row{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.mstone-row:last-child{border-bottom:none}
.mstone-day{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);width:48px;flex-shrink:0}
.mstone-txt{font-size:12.5px;color:var(--text);flex:1}
.modal-bx{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;width:100%;max-width:340px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-ttl{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.modal-msg{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.modal-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;padding:10px 12px;outline:none;margin-bottom:14px}
.modal-inp:focus{border-color:var(--cur)}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:11px;border-radius:9px;border:none;font-size:13px;font-family:'DM Mono',monospace;font-weight:600;cursor:pointer}
.modal-btn.cancel{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.modal-btn.ok{background:var(--cur);color:#000}
.modal-btn.danger{background:var(--danger);color:#fff}


/* ═══════════════════════════════════════════════════
   RESPONSIVE LAYOUT — PORTRAIT & LANDSCAPE
   All responsive rules in one place, no conflicts.
   ═══════════════════════════════════════════════════ */

/* ── Base layout structures (no orientation assumption) ── */
.app-shell{display:flex;flex-direction:column;min-height:100vh;}
.app-header{flex-shrink:0;}
.app-body{flex:1;display:flex;flex-direction:column;}
.app-sidebar{display:contents;} /* portrait: sidebar is transparent, children flow normally */
.app-main{flex:1;}

/* ══════════════════════════════════
   PORTRAIT MODE (default / narrow)
   Tabs scroll horizontally at top.
   Bottom nav fixed at bottom.
   ══════════════════════════════════ */
@media (orientation:portrait),(max-width:767px){
  .app-shell{display:block;}
  .app-body{display:block;}
  .app-sidebar{display:contents;}
  .app-main{display:block;}

  .tabs{
    display:flex;flex-direction:row;
    border-bottom:1px solid var(--border);
    padding:0 18px;
    overflow-x:auto;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tbtn{
    padding:10px 0;margin-right:16px;
    background:none;border:none;
    border-bottom:2px solid transparent;
    border-left:none;
    color:var(--muted);font-size:11px;
    font-family:'DM Mono',monospace;
    cursor:pointer;transition:all .15s;
    white-space:nowrap;flex-shrink:0;
    text-align:left;
  }
  .tbtn.active{
    border-bottom-color:var(--cur);
    color:var(--cur);
    border-left-color:transparent;
    background:none;
  }

  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;
    height:58px;
    background:var(--surface);
    border-top:1px solid var(--border);
    border-right:none;
    display:flex;flex-direction:row;
    align-items:stretch;
    z-index:1000;
    width:auto;
    padding-bottom:env(safe-area-inset-bottom,0px);
  }
  .bnav-btn{
    flex:1;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:2px;background:none;border:none;
    border-top:2px solid transparent;
    border-left:none;
    color:var(--muted);font-family:'DM Mono',monospace;
    font-size:9px;cursor:pointer;transition:color .15s;
    padding:6px 4px;
  }
  .bnav-btn.active{color:var(--cur);border-top-color:var(--cur);background:none;border-left-color:transparent;}
  .bnav-icon{font-size:18px;line-height:1;}

  .content{padding:14px 18px 74px;} /* 74px = bottom nav + safe area */
}

/* Portrait tablet wider content */
@media (orientation:portrait) and (min-width:600px){
  .content{padding:16px 24px 74px;}
  .modal-bx{max-width:460px;}
  .stat-grid{grid-template-columns:1fr 1fr 1fr;}
}

/* ══════════════════════════════════
   LANDSCAPE MODE (wide screen)
   Sidebar on left with vertical tabs.
   Main content scrolls on right.
   ══════════════════════════════════ */
@media (orientation:landscape) and (min-width:600px){
  /* Landscape uses the SAME layout as portrait: top tab row, full-width content,
     bottom nav. Just wider, using the full screen — no sidebar, no wasted space. */
  .app-shell{display:block;height:auto;overflow:visible;}
  .app-body{display:block;}
  .app-sidebar{display:contents;}
  .app-main{display:block;overflow:visible;}

  .tabs{
    display:flex;flex-direction:row;
    border-bottom:1px solid var(--border);border-right:none;
    padding:0 24px;overflow-x:auto;scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tbtn{
    padding:11px 0;margin-right:20px;
    background:none;border:none;
    border-bottom:2px solid transparent;border-left:none;
    color:var(--muted);font-size:12px;
    font-family:'DM Mono',monospace;
    cursor:pointer;transition:all .15s;
    white-space:nowrap;flex-shrink:0;text-align:left;
  }
  .tbtn.active{border-bottom-color:var(--cur);border-left-color:transparent;color:var(--cur);background:none;}

  .bottom-nav{
    position:fixed;bottom:0;left:0;right:0;
    height:54px;width:auto;
    background:var(--surface);
    border-top:1px solid var(--border);border-right:none;
    display:flex;flex-direction:row;align-items:stretch;
    z-index:1000;padding-bottom:env(safe-area-inset-bottom,0px);
  }
  .bnav-btn{
    flex:1;display:flex;flex-direction:row;
    align-items:center;justify-content:center;gap:8px;
    background:none;border:none;
    border-top:2px solid transparent;border-left:none;
    color:var(--muted);font-family:'DM Mono',monospace;
    font-size:12px;cursor:pointer;padding:6px 4px;
  }
  .bnav-btn.active{color:var(--cur);border-top-color:var(--cur);border-left-color:transparent;background:none;}
  .bnav-icon{font-size:16px;line-height:1;}

  /* Full-width content — no narrow centered column */
  .content{padding:16px 24px 70px;max-width:none;margin:0;width:auto;}

  /* Use the extra width: wider grids where it helps */
  .stat-grid{grid-template-columns:repeat(4,1fr);}
  .egg-grid-hdr,.egg-row{grid-template-columns:28px 1fr 130px 90px 36px;}
  .modal-bx{max-width:540px;}
}

/* Large landscape tablet 10"+ — two-column grids to fill width */
@media (orientation:landscape) and (min-width:1000px){
  .content{padding:18px 36px 70px;}
  .stat-grid{grid-template-columns:repeat(4,1fr);}
}

  if(!dobStr)return null;
  const d=new Date(dobStr+'T00:00:00');

function chopDaysForPhase(p){

// STORAGE
// Safe storage — falls back to in-memory if localStorage is blocked (iOS Files app, private mode)
const ls=(()=>{
  const mem={};
  let _ls=null;
  function store(){
    if(_ls!==null)return _ls;
    try{localStorage.setItem('__t','1');localStorage.removeItem('__t');_ls=localStorage;return _ls;}
    catch(e){_ls=false;return false;}
  }
  return{
    get:k=>{try{const s=store();return s?s.getItem(k):mem[k]||null;}catch{return mem[k]||null;}},
    set:(k,v)=>{try{const s=store();if(s)s.setItem(k,v);else mem[k]=v;}catch{mem[k]=v;}},
    del:k=>{try{const s=store();if(s)s.removeItem(k);else delete mem[k];}catch{delete mem[k];}},
    getJ:(k,d)=>{try{const v=JSON.parse(ls.get(k));return(v!==null&&v!==undefined)?v:d;}catch{return d;}},
    setJ:(k,v)=>{ls.set(k,JSON.stringify(v));},
    get length(){try{const s=store();return s?s.length:Object.keys(mem).length;}catch{return Object.keys(mem).length;}},
    key:i=>{try{const s=store();return s?s.key(i):Object.keys(mem)[i];}catch{return Object.keys(mem)[i];}}
  };
})();

const ck=(c,p,d,sl)=>`av|c${c}|p${p}|${d}|${sl}`;
const getChk=(c,p,d,sl)=>ls.get(ck(c,p,d,sl))==='1';
const setChk=(c,p,d,sl,v)=>ls.set(ck(c,p,d,sl),v?'1':'0');
const getCagePhase=c=>parseInt(ls.get(`av|cage${c}|phase`)||'1');
const setCagePhase=(c,p)=>ls.set(`av|cage${c}|phase`,p);
// Phase start dates are stored PER PHASE per cage: av|cage{c}|pstart|{phase}
// This lets each phase track its own start independently (laying started later than resting, etc).
const getPhaseStart=(c,p)=>{
  if(p===undefined)p=getCagePhase(c);
  return ls.get(`av|cage${c}|pstart|${p}`)||'';
};

const setEggDate=(c,d)=>ls.set(`av|cage${c}|eggdate`,d);
// Days from today until the show date for a cage. null if unset. 0 = show is today, negative = past.
function daysToShow(c){
  const s=getShowDate(c);if(!s)return null;
  return Math.round((new Date(s+'T00:00:00')-today())/(24*3600*1000));
}
const getNotes=(c,d)=>ls.get(`av|notes|c${c}|${d}`)||'';
const setNotes=(c,d,v)=>ls.set(`av|notes|c${c}|${d}`,v);

// DATE HELPERS
function today(){const d=new Date();d.setHours(0,0,0,0);return d}
function fmtDate(d){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}
function fmtDisp(d){return`${d.getDate()} ${MONTHS[d.getMonth()]}`}
function pad(n){return String(n).padStart(2,'0')}
function sameDay(a,b){return fmtDate(a)===fmtDate(b)}
function getWeekDates(off=0){
  // Always anchor to TODAY as the first row, then show 6 more days.
  // offset shifts by 7-day blocks: +1 = next 7 days, -1 = previous 7 days.
  const t=today();
  const ws=new Date(t);
  ws.setDate(t.getDate()+(off*7));
  return DAY_NAMES.map((name,i)=>{
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    // Day name must match the actual calendar day, not the fixed DAY_NAMES order
    const realDayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const realName=realDayNames[d.getDay()];
    return{name:realName,date:d,dateStr:fmtDate(d),isToday:sameDay(d,t)};
  });
}
function weeksInPhase(c,p){
  const s=getPhaseStart(c,p);if(!s)return null;
  const diff=Math.floor((today()-new Date(s+'T00:00:00'))/(7*24*3600*1000));
  return Math.max(0,diff);
}
// Days between a given date (yyyy-mm-dd) and the cage's phase start. null if not started.
// 0 = the start day itself, 6 = the 7th day. Used for the 7-day loading window.
function daysSinceStartForDate(c,dateStr,p){
  const s=getPhaseStart(c,p);if(!s)return null;
  const start=new Date(s+'T00:00:00'), d=new Date(dateStr+'T00:00:00');
  return Math.floor((d-start)/(24*3600*1000));
}
function hatchDate(lay){if(!lay)return'';const d=new Date(lay+'T00:00:00');d.setDate(d.getDate()+18);return fmtDate(d)}

// ALERTS
function renderAlerts(){
  const alerts=[];
  CAGES.forEach((_,i)=>{
    const p=getCagePhase(i);const w=weeksInPhase(i,p);if(w===null)return;
    if(p===7)return; // Young Bird is open-ended; no transition alarm
    const max=PHASES[p].max;
    const pname=p===3?'Egg Laying':p===4?'Incubation':p===5?'Chick Rearing':p===7?'Young':p===8?'Show Prep':'Phase '+p;
    if(w>=max)alerts.push({t:'danger',m:`⚠ ${CAGES[i]}: Week ${w} of ${pname} — transition overdue!`});
    else if(w>=max-1)alerts.push({t:'warn',m:`⏰ ${CAGES[i]}: Week ${w}/${max} — ${pname} ending soon`});
  });
  STOCK_ITEMS.forEach(item=>{
    const v=parseFloat(ls.get(`av|stock|${item.key}`)||'999');
    if(v<=item.low)alerts.push({t:'warn',m:`📦 Low stock: ${item.name} (${v}${item.unit})`});
  });
  const tv=ls.get(`av|temp|${fmtDate(today())}`);
  if(tv&&parseFloat(tv)>=40)alerts.push({t:'danger',m:`🌡️ HEAT ALERT: ${tv}°C today — check cooling!`});
  // Hatch approaching alert
  CAGES.forEach((_,i)=>{
    if(getCagePhase(i)===4){const ed=getEggDate(i);if(ed){const dth=Math.round((new Date(ed+'T00:00:00').setDate(new Date(ed+'T00:00:00').getDate()+18)-today())/(864e5));if(dth<=2&&dth>=0)alerts.push({t:'warn',m:`🐣 ${CAGES[i]}: Hatch ${dth===0?'TODAY':dth+'d away'} — prepare nest`});}}
  });
  // Fertility candling reminder — eggs 6–9 days old still marked Pending
  CAGES.forEach((_,i)=>{
    const cl=ls.getJ(`av|clutch|c${i}`,[]);
    let pendingDue=[];
    cl.forEach((c,ci)=>{
      c.eggs.forEach((e,ei)=>{
        if(e.layDate&&(!e.status||e.status==='unknown')){
          const d=Math.round((today()-new Date(e.layDate+'T00:00:00'))/(864e5));
          if(d>=6&&d<=9)pendingDue.push('E'+(ei+1));
        }
      });
    });
    if(pendingDue.length)alerts.push({t:'info',m:`🕯️ ${CAGES[i]}: Candle ${pendingDue.join(', ')} — ${pendingDue.length>1?'eggs are':'egg is'} 6+ days, check fertility`});
    // Quick first-egg date fallback (Egg Laid button) if no clutch eggs logged
    if(getCagePhase(i)===4&&!cl.some(c=>c.eggs.some(e=>e.layDate))){
      const ed=getEggDate(i);
      if(ed){
        const d=Math.round((today()-new Date(ed+'T00:00:00'))/(864e5));
        if(d>=6&&d<=9)alerts.push({t:'info',m:`🕯️ ${CAGES[i]}: First egg is ${d}d old — candle to check fertility`});
      }
    }
  });
  // Chick ringing reminder — hatched chicks at day 6–10 (ideal day 7) not yet ringed
  CAGES.forEach((_,i)=>{
    const cl=ls.getJ(`av|clutch|c${i}`,[]);
    let ringDue=[],ringSoon=[],ringUrgent=[];
    cl.forEach((c,ci)=>{
      c.eggs.forEach((e,ei)=>{
        if(e.status==='hatched'&&e.hatchedOn&&!e.ringed){
          const age=Math.round((today()-new Date(e.hatchedOn+'T00:00:00'))/(864e5));
          if(age>=6&&age<=8)ringDue.push('E'+(ei+1));
          else if(age===5)ringSoon.push('E'+(ei+1));
          else if(age>=9&&age<=10)ringUrgent.push('E'+(ei+1));
        }
      });
    });
    if(ringSoon.length)alerts.push({t:'info',m:`💍 ${CAGES[i]}: ${ringSoon.join(', ')} ready to ring tomorrow (day 6)`});
    if(ringDue.length)alerts.push({t:'warn',m:`💍 ${CAGES[i]}: RING ${ringDue.join(', ')} now — ideal window (day 6–8)`});
    if(ringUrgent.length)alerts.push({t:'danger',m:`💍 ${CAGES[i]}: Ring ${ringUrgent.join(', ')} TODAY — window closing (toes nearly too big)`});
  });
  // Millet in nest reminder — put spray millet in nest box at day 21 (chick 3 weeks old)
  // so chicks start learning to eat independently
  CAGES.forEach((_,i)=>{
    const cl=ls.getJ(`av|clutch|c${i}`,[]);
    let milletDue=[],milletOn=[];
    cl.forEach(c=>{
      c.eggs.forEach((e,ei)=>{
        if(e.status==='hatched'&&e.hatchedOn){
          const age=Math.round((today()-new Date(e.hatchedOn+'T00:00:00'))/(864e5));
          if(age===21)milletDue.push('E'+(ei+1));
          else if(age>21&&age<=35)milletOn.push('E'+(ei+1));
        }
      });
    });
    if(milletDue.length)alerts.push({t:'warn',m:`🌾 ${CAGES[i]}: E${milletDue.join(',')} is 3 weeks old — place spray millet in nest box today so chicks start learning to eat`});
    else if(milletOn.length)alerts.push({t:'info',m:`🌾 ${CAGES[i]}: Millet in nest — keep spray millet available until chicks fledge (~week 6)`});
  });
  // Wood shavings refresh reminder — every 5 days during chick rearing to maintain grip
  // and prevent splayed legs. Fire from hatch through fledging (~day 42)
  CAGES.forEach((_,i)=>{
    if(getCagePhase(i)!==5)return;
    const cl=ls.getJ(`av|clutch|c${i}`,[]);
    const hasChicks=cl.some(c=>c.eggs.some(e=>e.status==='hatched'&&e.hatchedOn));
    if(!hasChicks)return;
    const lastRefresh=ls.get(`av|shavings|c${i}`);
    const daysSince=lastRefresh?Math.round((today()-new Date(lastRefresh+'T00:00:00'))/(864e5)):99;
    if(daysSince>=5){
      alerts.push({t:'warn',m:`🪵 ${CAGES[i]}: Refresh wood shavings in nest box — chicks need grip to prevent splayed legs (last: ${lastRefresh?lastRefresh:'never recorded'})`});
    }
  });
  // Laying calcium reminder — when a cage is in the Egg Laying phase, remind to add
  // water-soluble calcium on the schedule days (Sat/Tue/Fri). The laying hen has the
  // highest calcium demand and water delivery guards against egg-binding/prolapse.
  CAGES.forEach((_,i)=>{
    if(getCagePhase(i)!==3)return;
    const dayName=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][today().getDay()];
    if(dayName==='Sat'||dayName==='Tue'||dayName==='Fri'){
      alerts.push({t:'warn',m:`💧 ${CAGES[i]}: Laying hen — add Liquid Calcium + D3 to water today (${dayName}). Flush font at 12hr. Guards against egg-binding.`});
    }
  });
  // Bird reaching breeding age — active cage only
  ls.getJ(`av|birds|c${S.activeCage}`,[]).forEach(b=>{
    if(b.dob){
      const am=ageMonths(b.dob);
      if(am===10){
        const dob=new Date(b.dob+'T00:00:00');
        const t=today();
        const exactTurnDate=new Date(dob);
        exactTurnDate.setMonth(dob.getMonth()+10);
        const daysSinceTurn=Math.round((t-exactTurnDate)/(864e5));
        if(daysSinceTurn>=0&&daysSinceTurn<=3){
          alerts.push({t:'info',m:`🐦 ${b.ring||'Bird'} just reached 10 months — breeding age`});
        }
      }
    }
  });
  const alertBar=document.getElementById('alertBar');
  if(alertBar)alertBar.innerHTML=alerts.length
    ?`<div style="padding:8px 18px 0">${alerts.map(a=>`<div class="alert ${a.t}">${a.m}</div>`).join('')}</div>`:'';
}

    h+=`<div class="phase-timer"><div style="flex:1"><div class="pt-label">PHASE ${S.activePhase} TIMER — ${CAGES[S.activeCage].toUpperCase()}</div>
    ${wks===null?`<div class="pt-weeks">Not started</div><div class="pt-sub">Tap ▶ to begin tracking</div>`
      :`<div class="pt-weeks${wks>=ph.max?' pt-danger':wks>=ph.max-1?' pt-warn':''}">Week ${wks+1}${ph.max<26?' / '+ph.max:''}</div>
      <div class="pt-sub" style="color:${wks>=ph.max?'var(--danger)':wks>=ph.max-1?'var(--warn)':'var(--muted)'}">
      Started ${fmtDisp(new Date(getPhaseStart(S.activeCage,S.activePhase)+'T00:00:00'))} · ${wks>=ph.max?'⚠ Transition overdue!':ph.max>=26?'growth phase':wks>=ph.max-1?`${ph.max-wks} wk left — prepare next`:`${ph.max-wks} wk remaining`}</div>`}
    </div><div class="pt-btns">${wks===null?`<button class="pt-btn" onclick="startPhase()">▶</button>`:`<button class="pt-btn" onclick="resetPhase()">↺</button>`}</div></div>`;
    // Editable start date — lets you correct the phase start to the actual date
    if(wks!==null){
      h+=`<div style="display:flex;align-items:center;gap:8px;margin:-4px 0 12px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:9px">
        <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">📅 Adjust start date:</span>
        <input type="date" value="${getPhaseStart(S.activeCage,S.activePhase)}" max="${fmtDate(today())}"
          onchange="setPhaseStartDate(this.value)"
          style="background:#161d17;border:1px solid var(--cur);border-radius:7px;color:#d4e8d6;font-size:12px;font-family:'DM Mono',monospace;padding:5px 8px;outline:none">
      </div>`;
    }
  }

  // Loading-week banner for Phase 2
  if(hasLoading){
    const dToday=wks!==null?daysSinceStartForDate(S.activeCage,fmtDate(today()),S.activePhase):null;
    if(loadingStatus==='loading'){
      const left=7-(dToday||0);
      h+=`<div class="alert warn" style="margin:0 0 12px">⚡ LOADING — Ornisol Sel E daily · day ${(dToday||0)+1} of 7 (${left} day${left===1?'':'s'} left)</div>`;
    } else if(loadingStatus==='post'){
      h+=`<div class="alert" style="margin:0 0 12px;background:color-mix(in srgb,var(--cur) 12%,transparent);border:1px solid color-mix(in srgb,var(--cur) 30%,transparent);color:var(--cur)">✓ POST-LOADING — Ornisol ~2×/week + Calcium+D3 before first egg</div>`;
    } else {
      h+=`<div class="alert warn" style="margin:0 0 12px">⚡ Press ▶ to start — then Ornisol Sel E runs daily for 7 days</div>`;
    }
    // Egg-laid button: show as soon as phase is started (day 0+).
    // A hen can lay anytime — don't gate it behind loading completion.
    if(wks!==null){
      const eggDate=getEggDate(S.activeCage);
      if(eggDate){
        const ed=new Date(eggDate+'T00:00:00');
        const daysSinceEgg=Math.round((today()-ed)/(864e5));
        const expHatch=new Date(ed);expHatch.setDate(ed.getDate()+18);
        h+=`<div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:10px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px">
          <div>
            <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:2px;margin-bottom:3px">🥚 FIRST EGG RECORDED</div>
            <div style="font-size:13px;color:var(--text)">${fmtDisp(ed)} · day ${daysSinceEgg+1} of incubation</div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px">Expected hatch: ${fmtDisp(expHatch)}</div>
          </div>
          <button onclick="eggLaidClear()" style="background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;padding:5px 9px;cursor:pointer">✕ Clear</button>
        </div>`;
      } else {
        h+=`<button onclick="eggLaid()" style="width:100%;padding:13px;border-radius:12px;border:2px solid var(--gold);background:color-mix(in srgb,var(--gold) 10%,transparent);color:var(--gold);font-size:14px;font-family:'DM Mono',monospace;font-weight:600;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px">
          🥚 First Egg Laid — tap to switch to Egg Laying
        </button>`;
      }
    }
  }
  // Phase 3 (Egg Laying): show clutch progress + button to move to Incubation when hen starts sitting
  if(S.activePhase===3){
    const eggDate=getEggDate(S.activeCage);
    const cl=ls.getJ(`av|clutch|c${S.activeCage}`,[]);
    let eggCount=0;
    cl.forEach(c=>c.eggs.forEach(e=>{if(e.layDate)eggCount++;}));
    h+=`<div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid #d98ae0;border-radius:10px;padding:12px 14px;margin-bottom:10px">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:#d98ae0;letter-spacing:2px;margin-bottom:4px">🥚 EGG LAYING — ACTIVE CLUTCH</div>
      <div style="font-size:13px;color:var(--text)">${eggCount>0?eggCount+' egg'+(eggCount>1?'s':'')+' laid so far':'Hen is laying — log each egg in the Clutch tab'}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px">💧 Liquid Calcium + D3 in water Sat/Tue/Fri during active laying — protects against egg-binding</div>
    </div>`;
    // Button to move from Egg Laying → Incubation (when clutch complete & hen sitting tight)
    h+=`<button onclick="startIncubation()" style="width:100%;padding:13px;border-radius:12px;border:2px solid var(--p3);background:color-mix(in srgb,var(--p3) 10%,transparent);color:var(--p3);font-size:14px;font-family:'DM Mono',monospace;font-weight:600;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px">
      🪺 Clutch complete / hen sitting — switch to Incubation
    </button>`;
  }
  // Phase 4 (Incubation): show egg-laid info + hatch countdown
  if(S.activePhase===4){
    const eggDate=getEggDate(S.activeCage);
    if(eggDate){
      const ed=new Date(eggDate+'T00:00:00');
      const daysSince=Math.round((today()-ed)/(864e5));
      const expHatch=new Date(ed);expHatch.setDate(ed.getDate()+18);
      const daysToHatch=Math.round((expHatch-today())/(864e5));
      h+=`<div style="background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:10px;padding:12px 14px;margin-bottom:10px">
        <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:2px;margin-bottom:4px">🥚 INCUBATION TRACKER</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:13px;color:var(--text)">First egg: ${fmtDisp(ed)} · Day ${daysSince+1}</div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px">
              ${daysToHatch>0?`Expected hatch: ${fmtDisp(expHatch)} (${daysToHatch}d)`:daysToHatch===0?'🐣 Expected hatch TODAY!':'🐣 Hatch overdue — check nest'}
            </div>
          </div>
          <div style="font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:${daysToHatch<=2?'var(--warn)':'var(--cur)'}">
            ${daysToHatch>0?daysToHatch+'d':daysToHatch===0?'🐣':'!'}
          </div>
        </div>
      </div>`;
    }
    // Hatch button — switch to Rearing when chicks hatch
    h+=`<button onclick="chicksHatched()" style="width:100%;padding:13px;border-radius:12px;border:2px solid var(--p3);background:color-mix(in srgb,var(--p3) 10%,transparent);color:var(--p3);font-size:14px;font-family:'DM Mono',monospace;font-weight:600;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px">
      🐣 Chicks Hatched — switch to Rearing
    </button>`;
  }

  h+=`<div class="week-nav"><button onclick="chgWeek(-1)">‹</button>
  <div class="wk-lbl">${S.weekOffset===0?'📅 This Week':S.weekOffset===-1?'← Last Week':S.weekOffset===1?'→ Next Week':S.weekOffset>1?`+${S.weekOffset} weeks ahead`:`${Math.abs(S.weekOffset)}w ago`}<small>${fmtDisp(wS)} – ${fmtDisp(wE)}</small></div>
  <button onclick="chgWeek(1)"${S.weekOffset>=4?' disabled style="opacity:.3"':''}>›</button></div>`;
  weeks.forEach(({name,date,dateStr,isToday})=>{
    // Per-day schedule: for Phase 2, pick s2 (post-loading) or s (loading/unstarted) based on
    // this specific day's position relative to the phase start — not today's position.
    let dayBaseSched = baseSched; // default fallback
    if(hasLoading && ph.s2){
      const dd=daysSinceStartForDate(S.activeCage,dateStr,S.activePhase);
      if(dd!==null && dd>=7){
        dayBaseSched = ph.s2; // this day is past loading — use post-loading schedule
      } else {
        dayBaseSched = ph.s;  // this day is in loading window or before start
      }
    }
    let sc=dayBaseSched[name];
    // Per-day loading override: if this date is within the first 7 days of the phase, force Ornisol.
    if(hasLoading){
      const dd=daysSinceStartForDate(S.activeCage,dateStr,S.activePhase);
      if(dd!==null && dd>=0 && dd<7){
        sc={...sc, wt:'Ornisol Sel E: Vit E + Selenium (loading day '+(dd+1)+'/7). Flush at 12hr'};
      }
    }
    // Show Prep: mark the actual show day, and clarify Friday travel-prep only applies in real show week
    let isShowDay=false;
    if(isShow){
      const sd=getShowDate(S.activeCage);
      if(sd && sd===dateStr){isShowDay=true;}
      if(sc.extra && name==='Fri'){
        sc={...sc, extra: showWeek ? sc.extra.replace('Pre-show:','🚗 SHOW WEEK — travel prep:') : '🪧 Show-cage practice · (travel prep starts in real show week)'};
      }
    }
    const cSF=getChk(S.activeCage,S.activePhase,dateStr,'sf');
    const cSD=getChk(S.activeCage,S.activePhase,dateStr,'sd');
    const cWT=getChk(S.activeCage,S.activePhase,dateStr,'wt');
    const hasExtra=!!sc.extra;
    const cEX=hasExtra?getChk(S.activeCage,S.activePhase,dateStr,'ex'):true;
    const all=cSF&&cSD&&cWT&&cEX;
    const isFuture=new Date(dateStr+'T00:00:00')>today()&&!isToday;
    const note=getNotes(S.activeCage,dateStr);
    h+=`<div class="day-row${isToday?' today':''}" style="${isShowDay?'border-color:var(--gold);box-shadow:0 0 20px rgba(192,160,32,.25);':isFuture?'opacity:0.6;':''}">
    <div class="day-hdr"><span class="day-name">${name}</span>
    ${isToday?'<span class="today-badge">TODAY</span>':''}
    ${isShowDay?'<span class="today-badge" style="background:var(--gold)">🏆 SHOW</span>':''}
    ${isFuture?'<span style="font-size:9px;font-family:\'DM Mono\',monospace;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:2px 5px">PREVIEW</span>':''}
    <span class="date-badge">${fmtDisp(date)}</span>${all&&!isFuture?'<span class="done-badge">✓ DONE</span>':''}</div>
    <div class="day-body">
    ${tRow('sf','🥗 SOFTFOOD',sc.sf,cSF,dateStr,isFuture)}
    ${tRow('sd','🌾 SEED MATRIX',sc.sd,cSD,dateStr,isFuture)}
    ${tRow('wt','💧 WATER / ADDITIVE',sc.wt,cWT,dateStr,isFuture)}
    ${hasExtra?tRow('ex','🏆 SHOW PREP TASKS',sc.extra,cEX,dateStr,isFuture):''}
    ${isFuture?'':`<div class="notes-row"><div class="notes-lbl">📝 CAGE NOTES</div>
    <textarea class="notes-inp" rows="2" placeholder="Observations, behavior, health notes..." onchange="saveNote('${dateStr}',this.value)">${note}</textarea>
    </div>`}
    </div></div>`;
  });
  return h;
}

function tRow(slot,label,text,checked,dateStr,isFuture){
  return`<div class="task-row"><button class="chk${checked?' on':''}" data-slot="${slot}" data-date="${dateStr}" ${isFuture?'disabled style="opacity:0.4;cursor:default"':''} onclick="${isFuture?'':' togChk(this)'}">
  <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5l3 3L10 1" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button><div><div class="tsk-lbl">${label}</div><div class="tsk-txt${checked?' done':''}">${text}</div></div></div>`;
}

// ── BIRDS TAB ─────────────────────────────────────────────────────────────────
function rBirds(){
  const birds=ls.getJ(`av|birds|c${S.activeCage}`,[]);
  const p=getCagePhase(S.activeCage);const wks=weeksInPhase(S.activeCage,p)||0;
  const readyPct=p===2?Math.min(100,Math.round((wks/3)*100)):p===1?Math.min(70,Math.round((wks/4)*70)):p===4||p===5?0:40;
  // Total birds across all cages
  const totalAllCages=CAGES.reduce((acc,_,i)=>acc+ls.getJ(`av|birds|c${i}`,[]).length,0);
  let h=`<div class="sec-title">BIRDS — ${CAGES[S.activeCage].toUpperCase()}</div>`;
  // Quick access to full registry
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:12px">
    <div>
      <div style="font-size:13px;color:var(--text);font-weight:600">Total registered: ${totalAllCages} bird${totalAllCages!==1?'s':''}</div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px">Across all ${CAGES.length} cages</div>
    </div>
    <button onclick="switchTab('birdreport')" style="background:color-mix(in srgb,var(--cur) 12%,transparent);border:1px solid var(--cur);border-radius:8px;color:var(--cur);font-size:11px;font-family:'DM Mono',monospace;font-weight:600;padding:7px 12px;cursor:pointer;white-space:nowrap">📋 Full Registry</button>
  </div>`;
  // Readiness card
  h+=`<div class="card" style="margin-bottom:14px"><div class="card-title">BREEDING READINESS</div>`;
  const birds_oldest=birds.length?birds.reduce((a,b)=>(ageMonths(a.dob)||0)>(ageMonths(b.dob)||0)?a:b):null;
  const agePct=birds_oldest?Math.min(100,Math.round(((ageMonths(birds_oldest.dob)||0)/12)*100)):0;
  [[`Phase (${PHASES[p].name})`,readyPct,'Phase progress'],['Oldest bird age',agePct,birds_oldest?(ageMonths(birds_oldest.dob)||'?')+' months':'No birds added']].forEach(([label,pct,note])=>{
    const col=pct>=80?'var(--success)':pct>=50?'var(--warn)':'var(--danger)';
    h+=`<div class="rbar-row"><div class="rbar-label" style="font-size:11px">${label}</div><div class="rbar"><div class="rbar-fill" style="width:${pct}%;background:${col}"></div></div><div class="rbar-pct">${pct}%</div></div><div style="font-size:10px;color:var(--muted);margin:-4px 0 10px 100px;font-family:'DM Mono',monospace">${note}</div>`;
  });
  h+=`</div>`;
  // Bird list
  if(!birds.length){
    h+=`<div class="empty"><div class="ei">🐦</div>No birds added to ${CAGES[S.activeCage]} yet</div>`;
  } else {
    birds.forEach((b,i)=>{
      const am=ageMonths(b.dob);const ready=breedingAge(b.dob);
      const dotCol=ringColorHex(b.ringColor);
      h+=`<div class="card" style="margin-bottom:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:8px">
            ${b.ringColor?`<div style="width:12px;height:12px;border-radius:50%;background:${dotCol};border:2px solid var(--border);flex-shrink:0"></div>`:''}
            <div><div style="font-size:14px;font-weight:600;color:var(--text)">${b.ring||'No ring'}</div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">${b.sex||''} · ${b.color||'colour TBD'}</div></div>
          </div>
          <div style="display:flex;gap:6px">
            <button onclick="editBird(${i})" style="background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-size:11px;font-family:'DM Mono',monospace;padding:4px 8px;cursor:pointer">✎</button>
            <button onclick="delBird(${i})" style="background:none;border:1px solid var(--border);border-radius:7px;color:var(--danger);font-size:11px;font-family:'DM Mono',monospace;padding:4px 8px;cursor:pointer">✕</button>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:11px">
          <div><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:2px">DOB</div><div>${b.dob?fmtDisp(new Date(b.dob+'T00:00:00')):'—'}</div></div>
          <div><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:2px">AGE</div><div style="color:${ready===false?'var(--warn)':'var(--text)'}">${am!==null?am+'mo':'—'}${ready===false?' ⚠ too young':ready?' ✓':''}</div></div>
          <div><div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:2px">LINEAGE</div><div style="font-size:10px">${b.sire?'♂ '+b.sire:''} ${b.dam?'♀ '+b.dam:''}</div></div>
        </div>
        ${b.notes?`<div style="margin-top:8px;font-size:11px;color:var(--muted);padding-top:6px;border-top:1px solid var(--border)">${b.notes}</div>`:''}
      </div>`;
    });
  }
  h+=`<button onclick="showAddBird(-1)" class="btn2 pri full" style="margin-top:4px">+ Add Bird to ${CAGES[S.activeCage]}</button>`;
  // Pairing log
  h+=`<div class="sec-title" style="margin-top:20px">PAIRING RECORD</div>`;
  const pairings=ls.getJ(`av|pairings|c${S.activeCage}`,[]);
  if(pairings.length){
    h+=`<div class="card"><table class="tbl"><tr><th>Date</th><th>Cock</th><th>Hen</th><th>Result</th><th></th></tr>`;
    pairings.forEach((pr,i)=>{
      h+=`<tr><td>${pr.date||'—'}</td><td>${pr.cock||'—'}</td><td>${pr.hen||'—'}</td><td>${pr.result||'—'}</td>
      <td><button onclick="delPairing(${i})" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px">✕</button></td></tr>`;
    });
    h+=`</table></div>`;
  }
  h+=`<button onclick="showAddPairing()" class="btn2 ghost full" style="margin-top:6px">+ Log Pairing</button>`;
  return h;
}

// ── BIRD REPORT TAB ───────────────────────────────────────────────────────────
// ── Bird family panel — renders inline inside a bird card in All Birds ──
function birdFamilyPanel(ring){
  const all=[];
  CAGES.forEach((_,ci)=>{ls.getJ(`av|birds|c${ci}`,[]).forEach(b=>{if(b.ring)all.push({...b,cageIdx:ci,cage:CAGES[ci]});});});
  const byRing={};all.forEach(b=>{byRing[b.ring]=b;});
  const sel=byRing[ring];if(!sel)return'';
  const children={};
  all.forEach(b=>{[b.sire,b.dam].forEach(p=>{if(p&&byRing[p]){if(!children[p])children[p]=[];children[p].push(b);}});});
  function sexIcon(s){return s==='Cock'?'♂':s==='Hen'?'♀':'?';}
  function sexCol(s){return s==='Cock'?'#7eb8f7':s==='Hen'?'#f7a8c4':'#aaa';}
  function chip(b,extra){
    if(!b)return'';
    return`<span onclick="S.treeRing='${b.ring}';renderAll()" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px;background:color-mix(in srgb,${sexCol(b.sex)} 12%,var(--surface));border:1px solid color-mix(in srgb,${sexCol(b.sex)} 30%,transparent);border-radius:8px;padding:5px 10px;font-family:'DM Mono',monospace;font-size:11px;color:${sexCol(b.sex)}">${sexIcon(b.sex)} ${b.ring}${b.color?` <span style="font-size:9px;color:var(--muted)">${b.color}</span>`:''}${extra||''}</span>`;
  }
  function ghostChip(label){return`<span style="display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px dashed var(--border);border-radius:8px;padding:5px 10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${label} <span style="font-size:9px">(unregistered)</span></span>`;}

  const sireB=sel.sire?byRing[sel.sire]:null;
  const damB=sel.dam?byRing[sel.dam]:null;
  const kids=children[sel.ring]||[];
  const fullSibs=sel.sire&&sel.dam?all.filter(b=>b.ring!==sel.ring&&b.sire===sel.sire&&b.dam===sel.dam):[];
  const halfSire=sel.sire?all.filter(b=>b.ring!==sel.ring&&b.sire===sel.sire&&!(sel.dam&&b.dam===sel.dam)):[];
  const halfDam=sel.dam?all.filter(b=>b.ring!==sel.ring&&b.dam===sel.dam&&!(sel.sire&&b.sire===sel.sire)):[];

  let h=`<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">`;
  h+=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--cur);margin-bottom:10px;letter-spacing:.05em">🌳 FAMILY TREE — ${sel.ring}</div>`;

  // Parents row
  if(sel.sire||sel.dam){
    h+=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:6px">PARENTS</div>`;
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">`;
    if(sel.sire)h+=sireB?chip(sireB):ghostChip('♂ '+sel.sire);
    if(sel.dam)h+=damB?chip(damB):ghostChip('♀ '+sel.dam);
    h+=`</div>`;
  }

  // Full siblings
  if(fullSibs.length){
    h+=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:6px">FULL SIBLINGS (${fullSibs.length}) — same ♂ × ♀ pair</div>`;
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${fullSibs.map(b=>chip(b)).join('')}</div>`;
  }

  // Half siblings — sire side
  if(halfSire.length){
    h+=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:6px">HALF SIBLINGS ♂ (${halfSire.length}) — same father ♂ ${sel.sire}</div>`;
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${halfSire.map(b=>chip(b,b.dam?` <span style="font-size:9px;color:var(--muted)">♀${b.dam}</span>`:'')).join('')}</div>`;
  }

  // Half siblings — dam side
  if(halfDam.length){
    h+=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:6px">HALF SIBLINGS ♀ (${halfDam.length}) — same mother ♀ ${sel.dam}</div>`;
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">${halfDam.map(b=>chip(b,b.sire?` <span style="font-size:9px;color:var(--muted)">♂${b.sire}</span>`:'')).join('')}</div>`;
  }

  // Offspring
  if(kids.length){
    h+=`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:6px">OFFSPRING (${kids.length})</div>`;
    h+=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">${kids.map(b=>chip(b)).join('')}</div>`;
  }

  if(!sel.sire&&!sel.dam&&!kids.length&&!fullSibs.length&&!halfSire.length&&!halfDam.length){
    h+=`<div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">No linked relatives registered yet</div>`;
  }
  h+=`</div>`;
  return h;
}

function exportBirdReport(){
  const rows=[['Cage','Ring','Sex','DOB','Age (months)','Colour','Ring Colour','Sire','Dam','Breeding Ready','Notes']];
  CAGES.forEach((cage,ci)=>{
    ls.getJ(`av|birds|c${ci}`,[]).forEach(b=>{
      const am=ageMonths(b.dob);
      const ready=breedingAge(b.dob);
      rows.push([
        cage,
        b.ring||'',b.sex||'',b.dob||'',
        am!==null?am:'',b.color||'',b.ringColor||'',
        b.sire||'',b.dam||'',
        ready===true?'Yes':ready===false?'No':'Unknown',
        (b.notes||'').replace(/,/g,' ')
      ]);
    });
  });
  const blob=new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='bird-registry-'+fmtDate(today())+'.csv';a.click();
  URL.revokeObjectURL(url);toast('Bird registry exported');
}

function saveBird(idx){
  idx=parseInt(idx);
  const g=id=>(document.getElementById(id)||{}).value||'';
  const targetCage=parseInt((document.getElementById('b_cage')||{}).value??S.activeCage);
  const ringVal=g('b_ring');
  const bird={ring:ringVal,sex:g('b_sex'),dob:g('b_dob'),color:g('b_color'),ringColor:g('b_ringcol'),sire:g('b_sire'),dam:g('b_dam'),notes:g('b_notes')};
  if(idx<0){
    // Adding new bird — put directly in target cage
    const birds=ls.getJ(`av|birds|c${targetCage}`,[]);
    birds.push(bird);
    ls.setJ(`av|birds|c${targetCage}`,birds);
    toast('Bird added to '+CAGES[targetCage]);
  } else {
    // Editing existing bird
    if(targetCage===S.activeCage){
      // Same cage — just update in place
      const birds=ls.getJ(`av|birds|c${S.activeCage}`,[]);
      birds[idx]=bird;
      ls.setJ(`av|birds|c${S.activeCage}`,birds);
      toast('Bird updated');
    } else {
      // Moving to different cage — remove from old, add to new
      const oldBirds=ls.getJ(`av|birds|c${S.activeCage}`,[]);
      oldBirds.splice(idx,1);
      ls.setJ(`av|birds|c${S.activeCage}`,oldBirds);
      const newBirds=ls.getJ(`av|birds|c${targetCage}`,[]);
      newBirds.push(bird);
      ls.setJ(`av|birds|c${targetCage}`,newBirds);
      toast('Moved to '+CAGES[targetCage]);
    }
  }
  closeModal();renderAll();
}

}

function manualBackup(){
  exportAllData();
  ls.set('av|last_auto_backup',fmtDate(today()));
  renderAll(); // refresh to update the "last backup" display
}
function exportAllData(){
  const data={};
  // Export from ls wrapper (covers both localStorage and in-memory fallback)
  try{
    // Try real localStorage first
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith('av|'))data[k]=localStorage.getItem(k);
    }
  }catch(e){}
  // Also sweep the ls in-memory store (catches data when localStorage is blocked)
  try{
    for(let i=0;i<ls.length;i++){
      const k=ls.key(i);
      if(k&&k.startsWith('av|')&&!data[k])data[k]=ls.get(k);
    }
  }catch(e){}
  if(!Object.keys(data).length){
    toast('No data found to export — have you added any birds or records?','warn');
    return;
  }
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='aviary-backup-'+fmtDate(today())+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✓ Backup exported — '+Object.keys(data).length+' records saved');
}
function importAllData(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      const count=Object.keys(data).length;
      if(!count){toast('Backup file is empty','warn');return;}
      // Import immediately — selecting the file is already a deliberate action
      let imported=0;
      Object.entries(data).forEach(([k,v])=>{
        if(k&&k.startsWith('av|')){ls.set(k,v);imported++;}
      });
      // Reload cage list from imported data
      CAGES=(()=>{try{const v=JSON.parse(ls.get('av|cagelist'));if(Array.isArray(v)&&v.length)return v;}catch{}return['Cage 1','Cage 2','Cage 3','Cage 4'];})();
      // If the IMPORTED backup predates the Egg Laying phase (no migration flag in the
      // file itself), its cage phases use the old numbering — migrate them now.
      // We clear the local flag first so the migration re-runs on this freshly imported data.
      if(!data['av|phase_migrated_egglaying']){
        ls.del('av|phase_migrated_egglaying');
        migratePhasesForEggLaying();
      }
      if(!data['av|phase_perphase_migrated']){
        ls.del('av|phase_perphase_migrated');
        migratePerPhaseStarts();
      }
      S.activeCage=0;
      S.activePhase=getCagePhase(0);
      setAccent(PHASES[S.activePhase]?.accent||'#5fbf8a');
      // Reset the file input so the same file can be re-imported if needed
      input.value='';
      toast('✓ Imported '+imported+' records successfully');
      renderAll();
    }catch(e){
      toast('Invalid backup file: '+e.message,'warn');
    }
  };
  r.onerror=()=>{toast('Could not read file','warn');};
  r.readAsText(file);
}

function rHistory(){
  const entries=[];
  for(let i=0;i<ls.length;i++){
    const k=ls.key(i);
    if(!k.startsWith(`av|c${S.activeCage}|p`))continue;
    const p=k.split('|');if(p.length<5)continue;
    const phase=parseInt(p[2].replace('p',''));
    const dateStr=p[3];
    if(!dateStr.match(/\d{4}-\d{2}-\d{2}/))continue;
    if(ls.get(k)!=='1')continue;
    let e=entries.find(x=>x.dateStr===dateStr&&x.phase===phase);
    if(!e){e={dateStr,phase,slots:[]};entries.push(e);}
    e.slots.push(p[4]);
  }
  if(!entries.length)return`<div class="empty"><div class="ei">📭</div>No history yet for ${CAGES[S.activeCage]}.</div>`;
  entries.sort((a,b)=>b.dateStr.localeCompare(a.dateStr));
  const weeks={};
  entries.forEach(e=>{
    const d=new Date(e.dateStr+'T00:00:00'),dfs=(d.getDay()+1)%7,ws=new Date(d);
    ws.setDate(d.getDate()-dfs);const wk=fmtDate(ws);
    if(!weeks[wk])weeks[wk]=[];weeks[wk].push(e);
  });
  let h=`<div class="sec-title">HISTORY — ${CAGES[S.activeCage].toUpperCase()}</div>`;
  Object.keys(weeks).sort().reverse().forEach(wk=>{
    const wd=new Date(wk+'T00:00:00'),we=new Date(wd);we.setDate(wd.getDate()+6);
    h+=`<div class="hist-week"><div class="hist-wk-lbl">${fmtDisp(wd)} – ${fmtDisp(we)}</div>`;
    weeks[wk].sort((a,b)=>b.dateStr.localeCompare(a.dateStr)).forEach(e=>{
      const d=new Date(e.dateStr+'T00:00:00'),dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
      const note=getNotes(S.activeCage,e.dateStr);
      h+=`<div class="hist-row"><span class="hist-date">${dn} ${fmtDisp(d)}</span>
      <div class="hist-dots"><div class="dot${e.slots.includes('sf')?' on':''}"></div>
      <div class="dot${e.slots.includes('sd')?' on':''}"></div>
      <div class="dot${e.slots.includes('wt')?' on':''}"></div></div>
      ${note?`<span class="hist-note">💬 ${note}</span>`:''}
      <span class="hist-ptag" style="color:${PHASES[e.phase].accent}">P${e.phase}</span></div>`;
    });
    h+=`</div>`;
  });
  h+=`<button class="export-btn" onclick="exportCSV()">⬇ Export History as CSV</button>`;
  return h;
}

  if(!clutches.length)h+=`<div class="empty"><div class="ei">🥚</div>No clutch recorded yet.</div>`;
  clutches.forEach((cl,ci)=>{
    h+=`<div class="clutch-card"><div class="clutch-hdr"><span class="clutch-title">Clutch #${ci+1} — ${cl.started}</span>

    <div class="clutch-body">
    <div class="egg-grid-hdr"><span>#</span><span>LAY DATE</span><span>STATUS</span><span>EXP HATCH</span><span></span></div>`;
    cl.eggs.forEach((egg,ei)=>{
      // Expected hatch shows as soon as a lay date is entered (lay + 18 days),
      // greyed for pending, coloured once fertile/hatched, struck-through if clear/dead.
      const hd=egg.layDate?hatchDate(egg.layDate):'';
      let hatchDisp='';
      if(hd){
        const hdShort=fmtDisp(new Date(hd+'T00:00:00'));

        } else {

        }
      }
      h+=`<div class="egg-row"><span class="egg-num">E${ei+1}</span>
      <input type="date" class="egg-inp" value="${egg.layDate||''}" onchange="updEgg(${ci},${ei},'layDate',this.value)">
      <select class="egg-sel" onchange="updEgg(${ci},${ei},'status',this.value)">
        <option value="unknown"${egg.status==='unknown'?' selected':''}>Pending</option>
        <option value="fertile"${egg.status==='fertile'?' selected':''}>✓ Fertile</option>
        <option value="clear"${egg.status==='clear'?' selected':''}>✗ Clear</option>
        <option value="dis"${egg.status==='dis'?' selected':''}>DIS</option>
        <option value="hatched"${egg.status==='hatched'?' selected':''}>🐣 Hatched</option>
        <option value="dead"${egg.status==='dead'?' selected':''}>✗ Dead</option>
      </select>
      <span class="egg-hatch ${egg.status}">${hatchDisp}</span>
      <button onclick="delEgg(${ci},${ei})" style="background:color-mix(in srgb,var(--danger) 15%,transparent);border:1px solid color-mix(in srgb,var(--danger) 40%,transparent);border-radius:7px;color:var(--danger);cursor:pointer;font-size:15px;font-weight:700;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0">✕</button></div>`;
      // Ringing status sub-row for hatched chicks
      if(egg.status==='hatched'&&egg.hatchedOn){
        const age=Math.round((today()-new Date(egg.hatchedOn+'T00:00:00'))/(864e5));
        if(egg.ringed){
          h+=`<div style="grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:5px 0 5px 28px;font-family:'DM Mono',monospace;font-size:10px;color:var(--success)">💍 Ringed${egg.ringedOn?' on '+egg.ringedOn:''} <button onclick="unringChick(${ci},${ei})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:10px;text-decoration:underline;margin-left:4px">undo</button></div>`;
        } else {
          const col=age>=9?'var(--danger)':age>=6?'var(--warn)':age>=5?'var(--cur)':'var(--muted)';
          const msg=age<5?`Ring at day 6–8 (chick is day ${age})`:age<=8?`💍 RING NOW — day ${age} (ideal 6–8)`:age<=10?`💍 Ring TODAY — day ${age}, window closing`:`⚠ Day ${age} — may be too late to ring`;
          h+=`<div style="grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0 5px 28px;font-family:'DM Mono',monospace;font-size:10px;color:${col}"><span>${msg}</span>
          <button onclick="ringChick(${ci},${ei})" style="background:color-mix(in srgb,var(--cur) 15%,transparent);border:1px solid var(--cur);border-radius:6px;color:var(--cur);cursor:pointer;font-size:10px;font-family:'DM Mono',monospace;padding:4px 10px;white-space:nowrap">Mark ringed</button></div>`;
        }
      }
    });
    // Next-hatch countdown summary for this clutch
    let soonest=null;
    cl.eggs.forEach(egg=>{
      if(egg.layDate&&egg.status!=='clear'&&egg.status!=='dead'&&egg.status!=='hatched'){
        const hd=new Date(hatchDate(egg.layDate)+'T00:00:00');
        if(!soonest||hd<soonest)soonest=hd;
      }
    });
    if(soonest){
      const days=Math.round((soonest-today())/(864e5));
      const col=days<0?'var(--muted)':days<=2?'var(--warn)':'var(--cur)';

      h+=`<div style="margin-top:10px;padding:9px 12px;background:color-mix(in srgb,${col} 10%,transparent);border:1px solid color-mix(in srgb,${col} 25%,transparent);border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;color:${col}">${txt}</div>`;

    const statusCol=daysSince===null||daysSince>=5?'var(--warn)':'var(--success)';
    const statusTxt=daysSince===null?'Never recorded — tap to mark done':daysSince===0?'Refreshed today ✓':daysSince===1?'Refreshed yesterday ✓':`Last refreshed ${daysSince} days ago${daysSince>=5?' — DUE NOW':''}`;
    h+=`<div style="background:color-mix(in srgb,${statusCol} 8%,var(--surface));border:1px solid color-mix(in srgb,${statusCol} 25%,transparent);border-radius:12px;padding:12px 14px;margin-bottom:12px">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:4px">🪵 WOOD SHAVINGS IN NEST</div>
      <div style="font-size:12px;color:${statusCol};font-family:'DM Mono',monospace;margin-bottom:8px">${statusTxt}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:10px">Refresh every 5 days to maintain grip and prevent splayed legs. Pine shavings only — no cedar.</div>
      <button onclick="markShavingsRefreshed()" style="background:var(--cur);border:none;border-radius:8px;color:#000;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;padding:8px 16px;cursor:pointer">🪵 Shavings Refreshed Today</button>
    </div>`;
  }
  h+=`<button class="export-btn" onclick="newClutch()" style="margin-top:12px">🥚 New Clutch</button>`;
  return h;
}

function rWeights(){

  let h=`<div class="sec-title">CHICK WEIGHTS — ${CAGES[S.activeCage].toUpperCase()}</div>`;
  if(!chicks.length)return h+`<div class="empty"><div class="ei">⚖️</div>Mark eggs as 'Hatched' in Clutch tab<br>to enable weight tracking here.</div>`;
  chicks.forEach(chick=>{
    const log=ls.getJ(`av|weight|${chick.key}`,[]);
    const latest=log.length?log[log.length-1]:null;
    const prev=log.length>1?log[log.length-2]:null;
    const delta=latest&&prev?latest.g-prev.g:null;
    h+=`<div class="weight-card">
    <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--cur);margin-bottom:10px">${chick.label}</div>
    <div class="weight-row"><div class="w-inp-wrap"><div class="w-inp-lbl">WEIGHT (grams)</div>
    <input type="number" class="w-inp" id="wi_${chick.key}" placeholder="e.g. 12.5" step="0.1"></div>
    <button class="w-btn" onclick="saveWeight('${chick.key}')">LOG</button></div>
    ${latest?`<div style="font-family:'DM Mono',monospace;font-size:12px;margin-bottom:8px">Latest: <span style="color:var(--cur);font-size:15px">${latest.g}g</span>
    ${delta!==null?`<span class="${delta>=0?'wl-up':'wl-dn'}" style="margin-left:8px">${delta>=0?'+':''}${delta.toFixed(1)}g</span>`:''}</div>`:''}
    ${log.length?`<div>${log.slice().reverse().slice(0,7).map((en,i)=>{
      const pv=log.slice().reverse()[i+1];const d2=pv?en.g-pv.g:null;
      return`<div class="wlog-row"><span class="wl-date">${en.date}</span>
      <span class="wl-val" style="color:var(--cur)">${en.g}g</span>
      ${d2!==null?`<span class="${d2>=0?'wl-up':'wl-dn'}">${d2>=0?'+':''}${d2.toFixed(1)}g</span>`:'<span></span>'}
      </div>`;}).join('')}</div>`:''}
    </div>`;
  });
  return h;
}

function rTemp(){
  const todayStr=fmtDate(today()),todayVal=ls.get(`av|temp|${todayStr}`)||'';
  const allT=[];
  for(let i=0;i<ls.length;i++){
    const k=ls.key(i);
    if(!k.startsWith('av|temp|'))continue;
    const d=k.replace('av|temp|','');
    if(d.match(/\d{4}-\d{2}-\d{2}/))allT.push({date:d,val:parseFloat(ls.get(k))});
  }
  allT.sort((a,b)=>b.date.localeCompare(a.date));
  return`<div class="sec-title">ROOM TEMPERATURE — DAMMAM ROOFTOP</div>
  <div class="temp-card">
    <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:10px">TODAY — ${fmtDisp(today())}</div>
    <div class="temp-today"><div class="temp-inp-wrap"><div class="temp-inp-lbl">ROOM TEMP (°C)</div>
    <input type="number" class="temp-inp" id="tInp" value="${todayVal}" placeholder="e.g. 36" step="0.5"></div>
    <button class="temp-save-btn" onclick="saveTemp()">LOG</button></div>
    <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)">🟢 Safe &lt;35°C &nbsp; 🟡 Watch 35–39°C &nbsp; 🔴 Danger ≥40°C</div>
  </div>
  ${allT.length?`<div class="temp-card"><div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:8px">TEMPERATURE LOG</div>
  ${allT.slice(0,30).map(t=>{
    const cls=t.val>=40?'t-hot':t.val>=35?'t-warn':'t-ok';
    const ic=t.val>=40?'🔴':t.val>=35?'🟡':'🟢';
    const d=new Date(t.date+'T00:00:00'),dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    return`<div class="temp-hist-row"><span class="temp-date">${dn} ${fmtDisp(d)}</span><span class="temp-val ${cls}">${ic} ${t.val}°C</span></div>`;
  }).join('')}</div>`:''}`;
}

function rChop(){
  // Vegetables are the chop component INSIDE Platform C soft food.
  // Chop is served exactly on Platform C soft-food days — not separately.
  const weeks=getWeekDates(S.weekOffset);
  const wS=weeks[0].date,wE=weeks[6].date,isCur=S.weekOffset===0;
  const cagePhase=getCagePhase(S.activeCage);

  let totalGMonth=0;
  const perCage=CAGES.map((name,i)=>{
    const p=getCagePhase(i);

    const gWeek=TBSP_PER_PAIR*days*G_PER_TBSP;

  let h='';

  // ── Platform C Soft Food Calculator ──────────────────────────────
  // Given grams of veg chop, calculates eggfood and dry rusk to add.
  // Ratios based on exhibition breeder consensus:

  // ---- Mung calculator ----

  // Warning if hatch approaching — rearing will need more mung
  if(hatchSoon){
    const rearingExtra=MUNG_TSP[5]*MUNG_DAYS[5]-MUNG_TSP[4]*MUNG_DAYS[4];
    h+=`<div class="alert warn" style="margin-top:10px">⚡ Hatch approaching — once chicks hatch, mung need increases to <b>1 tsp × 4 days = 4 tsp/wk</b> per pair in rearing. Prepare a larger batch next week.</div>`;

  // ---- Ingredient breakdown ----
  h+=`<div style="margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px">

      <span style="font-family:'DM Mono',monospace;font-size:13px;color:var(--p2)">${Math.round(totalGMonth*ratio)}g</span>
    </div>`).join('')}
  </div>
  <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:8px;line-height:1.7">
  🧊 Freeze in daily portions. Strain zucchini before freezing. Never refreeze thawed chop — critical in Dammam heat.</div>`;

  return h;
}
function calcChopMix(chopGStr){
  const chopG=parseFloat(chopGStr);
  if(!chopGStr||isNaN(chopG)||chopG<=0)return'<div style="font-size:13px;color:var(--muted);font-family:\'DM Mono\',monospace;padding:8px 0">Enter chop weight above to see the mix</div>';
  const eggfoodG=Math.round(chopG*0.40);
  const ruskG=Math.round(chopG*0.25);
  const totalG=chopG+eggfoodG+ruskG;
  // Per cage (divide by number of active cages with Phase 4)
  const activeCageCount=Math.max(1,CAGES.length);
  const perPairChop=Math.round(chopG/activeCageCount);
  const perPairEgg=Math.round(eggfoodG/activeCageCount);
  const perPairRusk=Math.round(ruskG/activeCageCount);
  return`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
    <div style="background:color-mix(in srgb,var(--cur) 8%,transparent);border:1px solid color-mix(in srgb,var(--cur) 20%,transparent);border-radius:10px;padding:12px;text-align:center">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--cur);margin-bottom:4px">🥬 VEG CHOP</div>
      <div style="font-size:26px;font-weight:700;color:var(--cur)">${chopG}g</div>
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px">from freezer</div>
    </div>
    <div style="background:color-mix(in srgb,#f7a84f 8%,transparent);border:1px solid color-mix(in srgb,#f7a84f 20%,transparent);border-radius:10px;padding:12px;text-align:center">
      <div style="font-family:'DM Mono',monospace;font-size:9px;color:#f7a84f;margin-bottom:4px">🥚 EGGFOOD</div>
      <div style="font-size:26px;font-weight:700;color:#f7a84f">${eggfoodG}g</div>

    '<div style="display:flex;gap:8px">'+
    '<button onclick="cancelRing()" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--muted);font-size:13px;font-family:DM Mono,monospace;padding:11px;cursor:pointer">Cancel</button>'+

function confirmRing(ci,ei){
  const inp=document.getElementById('_ringNumInp');
  const ringNum=(inp?inp.value:'').trim();
  if(!ringNum){toast('Enter a ring number','warn');return;}
  cancelRing();
  // Mark egg ringed
  const cl=ls.getJ(`av|clutch|c${S.activeCage}`,[]);
  if(cl[ci]&&cl[ci].eggs[ei]){
    cl[ci].eggs[ei].ringed=true;
    cl[ci].eggs[ei].ringedOn=fmtDisp(today());
    cl[ci].eggs[ei].ringNum=ringNum;
    ls.setJ(`av|clutch|c${S.activeCage}`,cl);
  }
  // Derive parents from latest pairing in this cage
  const pairings=ls.getJ(`av|pairings|c${S.activeCage}`,[]);
  const lastPair=pairings.length?pairings[pairings.length-1]:null;
  const sire=lastPair?lastPair.cock:'';
  const dam=lastPair?lastPair.hen:'';
  // Hatch date as DOB
  const hatchedOn=cl[ci]&&cl[ci].eggs[ei]?cl[ci].eggs[ei].hatchedOn:'';
  // Register chick in this cage's bird registry
  const birds=ls.getJ(`av|birds|c${S.activeCage}`,[]);
  // Avoid duplicate if same ring already registered
  if(birds.some(b=>b.ring===ringNum)){toast('💍 Ringed (already in registry)');renderAll();return;}
  birds.push({
    ring:ringNum,
    sex:'Unknown',
    dob:hatchedOn||'',
    color:'',
    ringColor:'',
    sire:sire,
    dam:dam,
    notes:'Bred '+(hatchedOn?fmtDisp(new Date(hatchedOn+'T00:00:00')):'this season')+' in '+CAGES[S.activeCage]+' — parents recorded at ringing'+((sire||dam)?' ('+(sire||'?')+' × '+(dam||'?')+')':'')+'. Parents are fixed and will not change if this cage is re-paired.'
  });
  ls.setJ(`av|birds|c${S.activeCage}`,birds);
  toast('💍 Ringed & added to registry as '+ringNum);
  renderAll();
}
function unringChick(ci,ei){
  const cl=ls.getJ(`av|clutch|c${S.activeCage}`,[]);
  if(!cl[ci]||!cl[ci].eggs[ei])return;
  delete cl[ci].eggs[ei].ringed;
  delete cl[ci].eggs[ei].ringedOn;
  delete cl[ci].eggs[ei].ringNum;
  ls.setJ(`av|clutch|c${S.activeCage}`,cl);
  renderAll();
}
// Tap-twice confirm — reliable replacement for modal confirmation on all devices
let _tapConfirm={key:null,t:0};
function tapConfirm(key,msg,fn){
  const now=Date.now();
  if(_tapConfirm.key===key&&now-_tapConfirm.t<3500){
    _tapConfirm={key:null,t:0};fn();
  } else {
    _tapConfirm={key,t:now};
    toast(msg||'Tap again to confirm','warn');
  }
}
