  const seen=new Set();
  for(let i=0;i<ls.length;i++){
    const k=ls.key(i);if(!k.startsWith('av|c'))continue;
    const p=k.split('|');if(p.length<5)continue;
    const ci=parseInt(p[1].replace('c','')),phase=parseInt(p[2].replace('p','')),dateStr=p[3];
    if(!dateStr.match(/\d{4}-\d{2}-\d{2}/))continue;
    const uid=`${ci}_${phase}_${dateStr}`;if(seen.has(uid))continue;seen.add(uid);
    const sf=getChk(ci,phase,dateStr,'sf')?'✓':'',sd=getChk(ci,phase,dateStr,'sd')?'✓':'',wt=getChk(ci,phase,dateStr,'wt')?'✓':'';
    const note=getNotes(ci,dateStr).replace(/,/g,' ');
    const d=new Date(dateStr+'T00:00:00'),dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    rows.push([CAGES[ci],`Phase ${phase}`,dateStr,dn,sf,sd,wt,note]);
  }
  const blob=new Blob([rows.map(r=>r.join(',')).join('\n')],{type:'text/csv'});
  const url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download=`aviary-log-${fmtDate(today())}.csv`;a.click();URL.revokeObjectURL(url);
}

// ── Auto weekly backup ──
// Runs silently on app load. If 7+ days since last backup, downloads JSON automatically.
function autoWeeklyBackup(){
  try{
    const INTERVAL_DAYS=7;
    const lastKey='av|last_auto_backup';
    const last=ls.get(lastKey);
    const now=today();
    const nowStr=fmtDate(now);
    if(last){
      const daysSince=Math.round((now-new Date(last+'T00:00:00'))/(864e5));
      if(daysSince<INTERVAL_DAYS)return; // not time yet
    }
    // Collect all data
    const data={};
    try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('av|'))data[k]=localStorage.getItem(k);}}catch(e){}
    try{for(let i=0;i<ls.length;i++){const k=ls.key(i);if(k&&k.startsWith('av|')&&!data[k])data[k]=ls.get(k);}}catch(e){}
    if(Object.keys(data).length<2)return; // not enough data, skip
    // Generate and download backup
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='aviary-auto-backup-'+nowStr+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    // Record the backup date
    ls.set(lastKey,nowStr);
    // Delayed toast so it doesn't clash with app init
    setTimeout(()=>toast('📦 Weekly backup saved automatically'),1500);
  }catch(e){
    console.warn('Auto backup failed:',e.message);
  }
}

// ── ONE-TIME MIGRATION: Egg Laying phase inserted as phase 3 ──
// Before this version, phases were: 3=Incubation, 4=Rearing, 5=Molt, 6=Young, 7=Show.
// Now phase 3 = Egg Laying, so every saved cage phase >=3 must shift +1.
// Runs once, guarded by a flag, so existing data shows the correct phase.
function migratePhasesForEggLaying(){
  try{
    if(ls.get('av|phase_migrated_egglaying')==='1')return; // already done
    // Shift every cage's saved phase: 3→4,4→5,5→6,6→7,7→8 (do high-to-low)
    const cageCount=Array.isArray(CAGES)?CAGES.length:4;
    // Scan ALL stored cage phase keys (not just current CAGES, in case more existed)
    for(let i=0;i<ls.length;i++){
      const k=ls.key(i);
      if(k&&/^av\|cage\d+\|phase$/.test(k)){
        const old=parseInt(ls.get(k)||'1');
        if(old>=3&&old<=7){ls.set(k,old+1);}
      }
    }
    ls.set('av|phase_migrated_egglaying','1');
  }catch(e){console.warn('Phase migration skipped:',e.message);}
}
migratePhasesForEggLaying();

// ── ONE-TIME MIGRATION: per-phase start dates ──
// Before this version, each cage had ONE shared start date (av|cage{c}|pstart) used for
// every phase. Now each phase tracks its own start (av|cage{c}|pstart|{phase}).
// Migrate by copying the old shared date into the cage's CURRENT phase slot, so the
// active phase keeps its timer and other phases correctly show "not started".
function migratePerPhaseStarts(){
  try{
    if(ls.get('av|phase_perphase_migrated')==='1')return;
    const keys=[];
    for(let i=0;i<ls.length;i++){const k=ls.key(i);if(k)keys.push(k);}
    keys.forEach(k=>{
      const m=k.match(/^av\|cage(\d+)\|pstart$/); // old shared-date key
      if(m){
        const c=m[1];
        const oldDate=ls.get(k);
        const curPhase=parseInt(ls.get(`av|cage${c}|phase`)||'1');
        if(oldDate){
          // Only set if the new per-phase key isn't already populated
          if(!ls.get(`av|cage${c}|pstart|${curPhase}`)){
            ls.set(`av|cage${c}|pstart|${curPhase}`,oldDate);
          }
        }
        // Remove the old shared key so it can't cause confusion
        ls.del(k);
      }
    });
    ls.set('av|phase_perphase_migrated','1');
  }catch(e){console.warn('Per-phase start migration skipped:',e.message);}
}
migratePerPhaseStarts();

try{
  S.activePhase=getCagePhase(0);
  renderAll();
  // Run auto backup after a short delay so the UI loads first
  setTimeout(autoWeeklyBackup, 2000);
}catch(e){
  console.error('Init error:',e);
  document.getElementById('mainContent').innerHTML=
    '<div style="padding:30px 20px;font-family:DM Mono,monospace;color:#e85a5a;font-size:13px;line-height:1.8">'+
    '<div style="font-size:18px;margin-bottom:12px">⚠ Load Error</div>'+
    '<div style="color:#aaa;margin-bottom:8px">'+e.message+'</div>'+
    '<div style="color:#666;font-size:11px">Try opening this file in Chrome or Safari browser instead of the Files app.</div>'+
    '</div>';
}
setInterval(()=>{const d=new Date(),days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];const el=document.getElementById('dateDisp');if(el)el.innerHTML=`<strong>${days[d.getDay()]}</strong> · ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;renderAlerts();},60000);
</script>
